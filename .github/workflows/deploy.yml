name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install build tools
        run: npm install -g html-minifier-terser

      - name: Build
        run: |
          set -e
          mkdir -p dist

          # ── App 1: Nøglebestilling (root) ──────────────────────
          html-minifier-terser index.html \
            --collapse-whitespace \
            --remove-comments \
            --minify-css true \
            --minify-js true \
            --output dist/index.html
          echo "Nøglebestilling: $(wc -c < index.html) → $(wc -c < dist/index.html) bytes"

          # ── App 2: Fælleslån (faelleslaan/) ────────────────────
          if [ -f "faelleslaan/index.html" ]; then
            mkdir -p dist/faelleslaan
            html-minifier-terser faelleslaan/index.html \
              --collapse-whitespace \
              --remove-comments \
              --minify-css true \
              --minify-js true \
              --output dist/faelleslaan/index.html
            echo "Fælleslån: $(wc -c < faelleslaan/index.html) → $(wc -c < dist/faelleslaan/index.html) bytes"
          fi

          # ── Ensure GitHub Pages doesn't try to run Jekyll ──────
          touch dist/.nojekyll

          echo "─── dist tree ───"
          find dist -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
